# --- BASIC OPTIONS ---
set -g default-shell "/bin/bash"
set-option -g set-clipboard on # !allows clipboard access in nvim
set -g mouse on
set -g base-index 1
set -g renumber-windows on
set -g mode-keys vi
set-option -g pane-active-border-style bg=orange # better active pane indicator
set-option -g focus-events on
set-option -g status-position top
set-option -g status-style 'bg=black'
set -g window-status-current-style bg=green,fg=black
set -g status-interval 20
set -g status-right-length 100
# set -g status-right "#[fg=green]| cpu #(top -bn1 | grep 'Cpu(s)' | awk '{print $2}')% | mem #(free -m | awk '/Mem/ {printf \"%.1f%%\", $3/$2*100}') | #[fg=magenta]vol: #(wpctl get-volume @DEFAULT_AUDIO_SINK@ | grep -q 'MUTED' && echo '#[fg=red]MUTED' || wpctl get-volume @DEFAULT_AUDIO_SINK@ | awk '{print $2 * 100 \"%%\"}') | #[fg=yellow]󱑎 %H:%M "

if-shell 'test "$(uname)" = "Darwin"' {
    # MacOS: Fixed memory formatting; removed volume and time
    set -g status-right "#[fg=green] cpu #(top -l 1 | grep 'CPU usage' | awk '{print $3}') | mem #(memory_pressure | awk '/percentage/ {print 100-$5\"%%\"}') "
} {
    # Linux: Standard logic with volume, cpu, and time
    set -g status-right "#[fg=green]| cpu #(top -bn1 | grep 'Cpu(s)' | awk '{print $2}')%% | mem #(free -m | awk '/Mem/ {printf \"%.1f%%%%\", $3/$2*100}') | #[fg=magenta]vol: #(wpctl get-volume @DEFAULT_AUDIO_SINK@ | grep -q 'MUTED' && echo '#[fg=red]MUTED' || wpctl get-volume @DEFAULT_AUDIO_SINK@ | awk '{print $2 * 100 \"%%%%\"}') | #[fg=yellow]󱑎 %H:%M "
}


# LINUX: WAYLAND VARIABLES
set -g update-environment "XDG_RUNTIME_DIR WAYLAND_DISPLAY HYPRLAND_INSTANCE_SIGNATURE"

# KEYBINDS
unbind-key -n C-h # ctrl bspc escapes neovim in normal mode
bind a source-file ~/.tmux.conf \; display-message "tmux config reloaded"
bind -n M-t popup -w 90% -h 90% -d "#{pane_current_path}"
bind -n M-c last-pane
bind -n M-Space resize-pane -Z
bind-key -n C-BTab previous-window
bind -n C-Tab next-window
bind -n M-c run-shell '
  panes=$(tmux list-panes | wc -l)
  zoomed=$(tmux display-message -p "#{window_zoomed_flag}")

  if [ "$panes" -eq 1 ]; then
      tmux split-window -h
  elif [ "$zoomed" -eq 1 ]; then
      tmux last-pane \; resize-pane -Z
  else
      tmux last-pane
  fi'

# AUTO RESTORE TMUX LAST SESSION
set-hook -g client-attached '
  if-shell "[ ! -f /tmp/tmux-restored ] && [ -f ~/.local/share/tmux/resurrect/last ]" \
     run-shell ~/.tmux/plugins/tmux-resurrect/scripts/restore.sh"
'
# --- Plugins ---
set -g @tpm_plugins "tmux-plugins/tpm \
  tmux-plugins/tmux-resurrect"

# Initialize TPM (plugin manager)
run -b "~/.tmux/plugins/tpm/tpm"

